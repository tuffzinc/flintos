<!DOCTYPE html>
<html lang="und" style="width:100%;height:100%;background-color:black;">
	<head>
		<meta charset="UTF-8">
		<meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0">
		<meta name="description" content="Eaglercraft 1.12 test directory HTML page">
		<meta name="keywords" content="eaglercraft, eaglercraftx, minecraft, 1.12, 1.12.2">
		<title>Minecraft 1.12.2</title>
		<meta property="og:locale" content="en-US">
		<meta property="og:type" content="website">
		<meta property="og:title" content="Eaglercraft 1.12.2">
		<meta property="og:description" content="test directory HTML page">
		
		<link type="image/png" rel="shortcut icon" href="https://cdn.jsdelivr.net/gh/irv77/AmplerLauncher@main/mc/1.12.2/favicon.png">
		
		<script type="text/javascript" src="https://cdn.jsdelivr.net/gh/irv77/AmplerLauncher@main/mc/1.12.2/classes.js"></script>
		
		<script type="text/javascript">
			"use strict";
			window.addEventListener("load", function() {
				if(window.location.href.indexOf("file:") === 0) {
					alert("HTTP please, do not open this file locally, run a local HTTP server and load it via HTTP");
				} else {
					var relayId = Math.floor(Math.random() * 3);
					window.eaglercraftXOpts = {
						demoMode: false,
						container: "game_frame",
						assetsURI: "https://cdn.jsdelivr.net/gh/irv77/AmplerLauncher@main/mc/1.12.2/assets.epk",
						localesURI: "https://cdn.jsdelivr.net/gh/irv77/AmplerLauncher@main/mc/1.12.2/lang/",
						worldsDB: "worlds",
						servers: [
							{ addr: "wss://play.zelz.net", name: "ZelzNet" },
							{ addr: "wss://mc.arch.lol", name: "ArchMC" },
							{ addr: "wss://beta.arch.lol", name: "§r §r §r §r §4§lArchMC Beta" }
						]
					};
					main();
				}
			});

			function fixGameFocus() {
				window.focus();
				const gameFrame = document.getElementById("game_frame");
				if (gameFrame) {
					gameFrame.focus();
					const canvas = gameFrame.querySelector("canvas");
					if (canvas) canvas.focus();
				}
			}
		</script>
		<style>
			#focus_fix_btn {
				position: fixed;
				bottom: 5px;
				right: 5px;
				z-index: 999999;
				font-size: 10px;
				font-family: sans-serif;
				background: rgba(50, 50, 50, 0.5);
				color: #aaa;
				border: 1px solid #555;
				padding: 2px 5px;
				cursor: pointer;
				border-radius: 3px;
				user-select: none;
			}
			#focus_fix_btn:hover {
				background: rgba(100, 100, 100, 0.8);
				color: #fff;
			}
		</style>
	</head>
	<body style="margin:0px;width:100%;height:100%;overflow:hidden;background-color:black;">
		<button id="focus_fix_btn" onclick="fixGameFocus()">Fix Inputs</button>

		<div style="width:100%;height:100%;" id="game_frame"></div>
	</body>
</html>
