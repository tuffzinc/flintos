<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FlintOS</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #000000;
            color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            overflow: hidden;
            user-select: none;
            -webkit-user-select: none;
        }
    </style>
</head>
<body>

    <flintos-app></flintos-app>

    <script>
        class FlintOSApp extends HTMLElement {
            constructor() {
                super();
                this.attachShadow({ mode: 'open' });
                this.currentActiveFileSrc = '';
            }

            async connectedCallback() {
                this.shadowRoot.innerHTML = `
                    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
                    <style>
                        :host { display: block; width: 100vw; height: 100vh; }
                        #app-container { width: 100%; height: 100%; position: relative; }
                        
                        /* Sandboxed Game Engine Player Overlay Styles */
                        #game-layer {
                            display: none;
                            position: fixed;
                            top: 0; left: 0;
                            width: 100vw; height: 100vh;
                            z-index: 99999;
                            background-color: #000000;
                        }
                        #game-frame {
                            width: 100%; height: 100%;
                            border: none;
                            background-color: #000000;
                        }
                        #close-game-btn {
                            position: absolute;
                            top: 25px; right: 35px;
                            background: rgba(15, 15, 20, 0.75);
                            color: #ffffff;
                            border: 1px solid rgba(255, 255, 255, 0.2);
                            padding: 10px 22px;
                            border-radius: 30px;
                            cursor: pointer;
                            font-size: 0.9rem;
                            font-weight: bold;
                            backdrop-filter: blur(10px);
                            -webkit-backdrop-filter: blur(10px);
                            transition: all 0.2s ease;
                            z-index: 100000;
                            display: flex;
                            align-items: center;
                            gap: 8px;
                        }
                        #close-game-btn:hover {
                            background: #ffffff;
                            color: #000000;
                            transform: scale(1.04);
                            border-color: #ffffff;
                        }
                    </style>
                    
                    <div id="app-container"></div>
                    
                    <div id="game-layer">
                        <button id="close-game-btn"><i class="fas fa-xmark"></i> Close Game</button>
                        <iframe id="game-frame" src="about:blank"></iframe>
                    </div>
                `;
                this.container = this.shadowRoot.getElementById('app-container');
                
                await this.loadView('/public/loading.html');
                
                setTimeout(() => {
                    const hasVisited = localStorage.getItem('flintos_visited');
                    if (!hasVisited) {
                        this.loadView('/public/welcome.html');
                    } else {
                        this.loadView('/public/home.html');
                    }
                }, 2200);
            }

            async loadView(filename) {
                try {
                    const response = await fetch(filename);
                    if (!response.ok) throw new Error(`Failed to load ${filename}`);
                    const html = await response.text();
                    this.container.innerHTML = html;
                    this.bindEvents(filename);
                } catch (err) {
                    console.error("FlintOS Core Error loading view:", err);
                }
            }

            bindEvents(currentView) {
                // Main Iframe Runtime Subsystem Control Hooks
                const closeGameBtn = this.shadowRoot.getElementById('close-game-btn');
                if (closeGameBtn) {
                    closeGameBtn.onclick = () => {
                        const gameLayer = this.shadowRoot.getElementById('game-layer');
                        const gameFrame = this.shadowRoot.getElementById('game-frame');
                        if (gameLayer && gameFrame) {
                            gameFrame.src = 'about:blank'; // Teardown execution container
                            gameLayer.style.display = 'none';
                        }
                    };
                }

                // Welcome Screen Event
                const enterBtn = this.shadowRoot.getElementById('enter-home');
                if (enterBtn) {
                    enterBtn.addEventListener('click', () => {
                        localStorage.setItem('flintos_visited', 'true');
                        this.loadView('/public/home.html');
                    });
                }

                // Navigation Events
                const storeBtn = this.shadowRoot.getElementById('store-btn');
                if (storeBtn) {
                    storeBtn.addEventListener('click', () => this.loadView('/public/store.html'));
                }

                const backBtn = this.shadowRoot.getElementById('back-btn');
                if (backBtn) {
                    backBtn.addEventListener('click', () => this.loadView('/public/home.html'));
                }

                // Run Active App Launcher Process
                const playBtn = this.shadowRoot.getElementById('play-btn');
                if (playBtn) {
                    playBtn.addEventListener('click', () => {
                        if (this.currentActiveFileSrc) {
                            this.launchIframeRuntime(this.currentActiveFileSrc);
                        } else {
                            alert("FlintOS Error: No execution sequence target loaded.");
                        }
                    });
                }
                
                const timeEl = this.shadowRoot.getElementById('current-time');
                if (timeEl) {
                    const updateTime = () => {
                        const now = new Date();
                        timeEl.textContent = now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
                    };
                    updateTime();
                }

                // Routing Data Engine Pipeline Dispatches
                if (currentView === '/public/home.html') {
                    this.loadGamesData('home');
                } else if (currentView === '/public/store.html') {
                    this.loadGamesData('store');
                }
            }

            async loadGamesData(targetLayer) {
                try {
                    const response = await fetch('/data/games.json');
                    const games = await response.json();
                    if (targetLayer === 'home') {
                        this.renderHomeGames(games);
                    } else if (targetLayer === 'store') {
                        this.renderStoreGames(games);
                    }
                } catch (error) {
                    console.error("FlintOS FileSystem Error reading games.json:", error);
                }
            }

            renderHomeGames(games) {
                const appRow = this.shadowRoot.getElementById('dynamic-app-row');
                if (!appRow) return;

                const storeBtn = this.shadowRoot.getElementById('store-btn');
                appRow.innerHTML = '';
                if (storeBtn) appRow.appendChild(storeBtn);

                // Strategy Layer Filter: Render ONLY featured configurations on dashboard row
                const featuredGames = games.filter(game => game.featured === true);

                featuredGames.forEach((game) => {
                    const icon = document.createElement('div');
                    icon.className = 'app-icon';
                    icon.style.backgroundImage = `url('${game.image}')`;
                    icon.style.backgroundSize = 'cover';
                    icon.style.backgroundPosition = 'center';
                    
                    icon.addEventListener('click', () => this.updateDashboardHero(game, icon));
                    appRow.appendChild(icon);
                });

                // Auto initialize hero matrix context using first element pointer
                if (featuredGames.length > 0) {
                    const firstGameIcon = appRow.querySelector('.app-icon:not(.store-btn)');
                    if (firstGameIcon) {
                        this.updateDashboardHero(featuredGames[0], firstGameIcon);
                    }
                }

                const libraryIcon = document.createElement('div');
                libraryIcon.className = 'app-icon library-icon';
                libraryIcon.style.background = 'rgba(255,255,255,0.05)';
                libraryIcon.style.display = 'flex';
                libraryIcon.style.alignItems = 'center';
                libraryIcon.style.justifyContent = 'center';
                libraryIcon.style.fontSize = '11px';
                libraryIcon.style.color = 'rgba(255,255,255,0.6)';
                libraryIcon.innerHTML = `<i class="fas fa-layer-group" style="margin-bottom:4px; font-size:14px; display:block; text-align:center;"></i>`;
                
                // Extra style handling for standard block structures inside matrix configurations
                libraryIcon.style.flexDirection = 'column';
                appRow.appendChild(libraryIcon);
            }

            renderStoreGames(games) {
                const storeGrid = this.shadowRoot.getElementById('dynamic-store-grid');
                if (!storeGrid) return;

                storeGrid.innerHTML = '';

                // Strategy Layer Render: Expose absolute total array allocation layout inside grid
                games.forEach((game) => {
                    const item = document.createElement('div');
                    item.className = 'store-item';
                    item.style.background = `linear-gradient(to top, rgba(0,0,0,0.95) 15%, rgba(0,0,0,0.15) 100%), url('${game.bg || game.image}') center/cover`;
                    
                    item.innerHTML = `
                        <p class="item-title">${game.name}</p>
                        <p class="item-price"><i class="fas fa-play" style="font-size:10px; margin-right:5px;"></i> Launch</p>
                    `;
                    
                    // Allow absolute any targeted structure profile from execution nodes instantly
                    item.addEventListener('click', () => {
                        this.launchIframeRuntime(game.file_src);
                    });
                    
                    storeGrid.appendChild(item);
                });
            }

            updateDashboardHero(game, selectedIcon) {
                this.shadowRoot.querySelectorAll('.app-icon').forEach(el => el.classList.remove('active'));
                selectedIcon.classList.add('active');

                this.currentActiveFileSrc = game.file_src;

                const screen = this.shadowRoot.getElementById('home-screen');
                const title = this.shadowRoot.getElementById('hero-title');
                const desc = this.shadowRoot.getElementById('hero-desc');

                if (screen) {
                    screen.style.backgroundImage = `linear-gradient(180deg, rgba(0,0,0,0.5) 0%, rgba(0,0,0,0.1) 40%, rgba(0,0,0,0.9) 100%), url('${game.bg}')`;
                }
                if (title) title.textContent = game.name;
                if (desc) desc.textContent = game.description;
            }

            launchIframeRuntime(sourceUrl) {
                const gameLayer = this.shadowRoot.getElementById('game-layer');
                const gameFrame = this.shadowRoot.getElementById('game-frame');
                if (gameLayer && gameFrame) {
                    gameFrame.src = sourceUrl;
                    gameLayer.style.display = 'block';
                }
            }
        }

        customElements.define('flintos-app', FlintOSApp);
    </script>
</body>
</html>
