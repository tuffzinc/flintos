<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FlintOS</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #05070f;
            color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            overflow: hidden;
            user-select: none;
            -webkit-user-select: none;
        }
    </style>
</head>
<body>

    <flintos-app></flintos-app>

    <script>
        class FlintOSApp extends HTMLElement {
            constructor() {
                super();
                this.attachShadow({ mode: 'open' });
                this.currentActiveFileSrc = '';
                this.timeInterval = null;
            }

            async connectedCallback() {
                this.shadowRoot.innerHTML = `
                    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
                    <style>
                        :host { display: block; width: 100vw; height: 100vh; }
                        #app-container { width: 100%; height: 100%; position: relative; }
                        
                        /* Premium Console Player Sandbox Layer */
                        #game-layer {
                            display: none;
                            position: fixed;
                            top: 0; left: 0;
                            width: 100vw; height: 100vh;
                            z-index: 99999;
                            background-color: #000000;
                        }
                        #game-layer.active {
                            display: block;
                            animation: gameLaunch 0.5s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
                        }
                        @keyframes gameLaunch {
                            from { opacity: 0; transform: scale(1.04); }
                            to { opacity: 1; transform: scale(1); }
                        }
                        #game-frame {
                            width: 100%; height: 100%;
                            border: none;
                            background-color: #000000;
                        }
                        #close-game-btn {
                            position: absolute;
                            top: 25px; 
                            right: 25px;
                            background: rgba(15, 15, 25, 0.7);
                            color: #ffffff;
                            border: 1px solid rgba(255, 255, 255, 0.12);
                            padding: 10px 22px;                
                            border-radius: 30px;              
                            font-size: 0.9rem;                
                            font-weight: 600;       
                            cursor: pointer;
                            backdrop-filter: blur(20px);
                            -webkit-backdrop-filter: blur(20px);
                            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
                            z-index: 100000;
                            display: flex;
                            align-items: center;
                            gap: 8px;
                            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
                        }
                        #close-game-btn:hover {
                            background: #ffffff;
                            color: #000000;
                            border-color: #ffffff;
                            transform: translateY(-2px);
                            box-shadow: 0 8px 25px rgba(255,255,255,0.25);
                        }
                    </style>
                    
                    <div id="app-container"></div>
                    
                    <div id="game-layer">
                        <button id="close-game-btn"><i class="fas fa-xmark"></i> Close Game</button>
                        <iframe id="game-frame" src="about:blank"></iframe>
                    </div>
                `;
                this.container = this.shadowRoot.getElementById('app-container');
                
                await this.loadView('/public/loading.html');
                
                setTimeout(() => {
                    const hasVisited = localStorage.getItem('flintos_visited');
                    if (!hasVisited) {
                        this.loadView('/public/welcome.html');
                    } else {
                        this.loadView('/public/home.html');
                    }
                }, 2200);
            }

            async loadView(filename) {
                try {
                    const response = await fetch(filename);
                    if (!response.ok) throw new Error(`Failed to load ${filename}`);
                    const html = await response.text();
                    this.container.innerHTML = html;
                    this.bindEvents(filename);
                } catch (err) {
                    console.error("FlintOS Core Error loading view:", err);
                }
            }

            bindEvents(currentView) {
                const closeGameBtn = this.shadowRoot.getElementById('close-game-btn');
                if (closeGameBtn) {
                    closeGameBtn.onclick = () => {
                        const gameLayer = this.shadowRoot.getElementById('game-layer');
                        const gameFrame = this.shadowRoot.getElementById('game-frame');
                        if (gameLayer && gameFrame) {
                            gameFrame.src = 'about:blank';
                            gameLayer.classList.remove('active');
                        }
                    };
                }

                const enterBtn = this.shadowRoot.getElementById('enter-home');
                if (enterBtn) {
                    enterBtn.onclick = () => {
                        localStorage.setItem('flintos_visited', 'true');
                        this.loadView('/public/home.html');
                    };
                }

                const backBtn = this.shadowRoot.getElementById('back-btn');
                if (backBtn) {
                    backBtn.onclick = () => this.loadView('/public/home.html');
                }

                const playBtn = this.shadowRoot.getElementById('play-btn');
                if (playBtn) {
                    playBtn.onclick = () => {
                        if (this.currentActiveFileSrc) {
                            this.launchIframeRuntime(this.currentActiveFileSrc);
                        } else {
                            alert("FlintOS Error: No execution target selected.");
                        }
                    };
                }
                
                const timeEl = this.shadowRoot.getElementById('current-time');
                if (timeEl) {
                    const updateTime = () => {
                        const now = new Date();
                        timeEl.textContent = now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
                    };
                    updateTime();
                    if (!this.timeInterval) {
                        this.timeInterval = setInterval(updateTime, 30000);
                    }
                }

                if (currentView === '/public/home.html') {
                    this.loadGamesData('home');
                } else if (currentView === '/public/library.html') {
                    this.loadGamesData('library');
                }
            }

            async loadGamesData(targetLayer) {
                try {
                    const response = await fetch('/data/games.json');
                    const games = await response.json();
                    if (targetLayer === 'home') {
                        this.renderHomeGames(games);
                    } else if (targetLayer === 'library') {
                        this.renderLibraryGames(games);
                    }
                } catch (error) {
                    console.error("FlintOS FileSystem Error reading games.json:", error);
                }
            }

            renderHomeGames(games) {
                const appRow = this.shadowRoot.getElementById('dynamic-app-row');
                if (!appRow) return;

                appRow.innerHTML = '';

                const featuredGames = games.filter(game => game.featured === true);

                featuredGames.forEach((game) => {
                    const icon = document.createElement('div');
                    icon.className = 'app-icon';
                    icon.style.backgroundImage = `url('${game.image}')`;
                    icon.style.backgroundSize = 'cover';
                    icon.style.backgroundPosition = 'center';
                    icon.style.backgroundRepeat = 'no-repeat';
                    
                    icon.addEventListener('click', () => this.updateDashboardHero(game, icon));
                    appRow.appendChild(icon);
                });

                const libraryIcon = document.createElement('div');
                libraryIcon.className = 'app-icon library-icon';
                libraryIcon.style.background = 'rgba(255,255,255,0.05)';
                libraryIcon.style.display = 'flex';
                libraryIcon.style.alignItems = 'center';
                libraryIcon.style.justifyContent = 'center';
                libraryIcon.style.fontSize = '11px';
                libraryIcon.style.color = 'rgba(255,255,255,0.6)';
                libraryIcon.style.flexDirection = 'column';
                libraryIcon.style.cursor = 'pointer';
                libraryIcon.innerHTML = `<i class="fas fa-layer-group" style="margin-bottom:4px; font-size:14px; display:block; text-align:center;"></i><span>Library</span>`;
                
                libraryIcon.addEventListener('click', () => this.loadView('/public/library.html'));
                appRow.appendChild(libraryIcon);

                const heroContent = this.shadowRoot.getElementById('hero-content');
                const emptyState = this.shadowRoot.getElementById('empty-state');

                if (featuredGames.length > 0) {
                    const firstGameIcon = appRow.querySelector('.app-icon:not(.library-icon)');
                    if (firstGameIcon) {
                        this.updateDashboardHero(featuredGames[0], firstGameIcon);
                    }
                    
                    if (heroContent) heroContent.style.display = 'block';
                    if (emptyState) emptyState.style.display = 'none';
                } else {
                    const title = this.shadowRoot.getElementById('hero-title');
                    const desc = this.shadowRoot.getElementById('hero-desc');
                    const screen = this.shadowRoot.getElementById('home-screen');
                    if (title) title.textContent = "Welcome to FlintOS";
                    if (desc) desc.textContent = "No featured games available.";
                    if (screen) screen.style.backgroundImage = "linear-gradient(180deg, rgba(0,0,0,0.6) 0%, rgba(0,0,0,0.95) 100%)";
                    
                    if (heroContent) heroContent.style.display = 'none';
                    if (emptyState) emptyState.style.display = 'block';
                }
            }

            renderLibraryGames(games) {
                const libraryGrid = this.shadowRoot.getElementById('dynamic-library-grid');
                if (!libraryGrid) return;

                libraryGrid.innerHTML = '';

                if (games.length === 0) {
                    libraryGrid.innerHTML = `
                        <div class="empty-library-msg">
                            <i class="fas fa-box-open" style="font-size: 3rem; margin-bottom: 15px; opacity: 0.3;"></i>
                            <p>No games found in the library.</p>
                        </div>
                    `;
                    return;
                }

                games.forEach((game) => {
                    const item = document.createElement('div');
                    item.className = 'store-item';
                    item.style.background = `linear-gradient(to top, rgba(3, 5, 10, 0.95) 20%, rgba(3, 5, 10, 0.2) 100%), url('${game.bg || game.image}') center/cover`;
                    item.style.cursor = 'pointer';
                    
                    item.innerHTML = `
                        <div class="store-item-details">
                            <p class="item-title">${game.name}</p>
                            <p class="item-price launch-badge"><i class="fas fa-play" style="font-size:10px; margin-right:6px;"></i> Launch</p>
                        </div>
                    `;
                    
                    item.onclick = () => {
                        this.launchIframeRuntime(game.file_src);
                    };
                    
                    libraryGrid.appendChild(item);
                });
            }

            updateDashboardHero(game, selectedIcon) {
                this.shadowRoot.querySelectorAll('.app-icon').forEach(el => el.classList.remove('active'));
                selectedIcon.classList.add('active');

                this.currentActiveFileSrc = game.file_src;

                const screen = this.shadowRoot.getElementById('home-screen');
                const title = this.shadowRoot.getElementById('hero-title');
                const desc = this.shadowRoot.getElementById('hero-desc');

                const heroContent = this.shadowRoot.getElementById('hero-content');
                if (heroContent) heroContent.style.display = 'block'; 
                
                const emptyState = this.shadowRoot.getElementById('empty-state');
                if (emptyState) emptyState.style.display = 'none';

                if (screen) {
                    screen.style.backgroundImage = `linear-gradient(180deg, rgba(0,0,0,0.2) 0%, rgba(5,8,20,0.5) 40%, rgba(5,8,20,0.95) 100%), url('${game.bg || game.image}')`;
                }
                if (title) title.textContent = game.name;
                if (desc) desc.textContent = game.description;
            }

            launchIframeRuntime(sourceUrl) {
                const gameLayer = this.shadowRoot.getElementById('game-layer');
                const gameFrame = this.shadowRoot.getElementById('game-frame');
                if (gameLayer && gameFrame) {
                    gameFrame.src = sourceUrl;
                    gameLayer.classList.add('active');
                }
            }
        }

        customElements.define('flintos-app', FlintOSApp);
    </script>
</body>
</html>
