<style>
    .home-screen {
        height: 100%;
        background-repeat: no-repeat;
        background-position: center center;
        background-size: cover;
        display: flex;
        flex-direction: column;
        padding: 35px 55px;
        box-sizing: border-box;
        animation: fadeIn 0.4s ease-out;
        transition: background-image 0.45s cubic-bezier(0.25, 0.46, 0.45, 0.94);
    }
    
    .header-bar {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 25px;
    }
    .tabs {
        display: flex;
        gap: 35px;
        font-size: 1.1rem;
    }
    .tabs span { opacity: 0.5; cursor: pointer; font-weight: 600; transition: opacity 0.2s; }
    .tabs span.active { opacity: 1; border-bottom: 2px solid #ffffff; padding-bottom: 4px; }
    .status-icons {
        display: flex;
        gap: 22px;
        align-items: center;
        font-size: 1.1rem;
        opacity: 0.85;
    }

    .app-row {
        display: flex;
        gap: 14px;
        align-items: center;
        margin-bottom: auto;
    }
    .app-icon {
        width: 70px;
        height: 70px;
        border-radius: 18px;
        background: rgba(255,255,255,0.08);
        backdrop-filter: blur(10px);
        cursor: pointer;
        transition: all 0.25s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        border: 2px solid transparent;
        box-shadow: 0 6px 12px rgba(0,0,0,0.4);
    }
    .app-icon:hover {
        transform: scale(1.08);
        border-color: rgba(255,255,255,0.4);
    }
    .app-icon.active {
        transform: scale(1.16);
        border-color: #ffffff;
        box-shadow: 0 12px 24px rgba(0,0,0,0.6);
    }
    .app-icon.store-btn {
        background: linear-gradient(135deg, #003780, #0070cc);
        color: #ffffff;
        font-weight: bold;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 12px;
        letter-spacing: 0.5px;
    }

    .hero-info {
        margin-bottom: 35px;
        max-width: 650px;
    }
    .hero-tag {
        font-size: 0.85rem;
        opacity: 0.6;
        margin-bottom: 6px;
        text-transform: uppercase;
        letter-spacing: 1px;
    }
    .hero-title {
        font-size: 3.2rem;
        margin: 0 0 15px 0;
        font-weight: 300;
        text-shadow: 0 3px 12px rgba(0,0,0,0.85);
    }
    .hero-desc {
        font-size: 1.05rem;
        opacity: 0.85;
        line-height: 1.45;
        text-shadow: 0 2px 6px rgba(0,0,0,0.6);
        margin-bottom: 20px;
    }
    .action-btn {
        background: #ffffff;
        color: #000000;
        border: none;
        padding: 10px 30px;
        border-radius: 20px;
        font-weight: bold;
        cursor: pointer;
        font-size: 0.95rem;
        box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        transition: transform 0.2s;
    }
    .action-btn:hover {
        transform: scale(1.05);
    }

    .activities {
        display: flex;
        gap: 20px;
    }
    .activity-card {
        flex: 0 0 290px;
        height: 155px;
        background: rgba(18, 18, 22, 0.55);
        backdrop-filter: blur(15px);
        border-radius: 14px;
        border: 1px solid rgba(255,255,255,0.08);
        padding: 18px;
        box-sizing: border-box;
        display: flex;
        flex-direction: column;
        justify-content: space-between;
        cursor: pointer;
        transition: all 0.2s ease;
    }
    .activity-card:hover {
        transform: translateY(-4px);
        background: rgba(26, 26, 32, 0.75);
        border-color: rgba(255,255,255,0.2);
    }
    .activity-header { display: flex; align-items: center; gap: 8px; font-size: 0.8rem; opacity: 0.75; font-weight: 600; }
    .activity-title { font-size: 1.15rem; font-weight: 500; line-height: 1.3; }

    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
</style>

<div class="home-screen" id="home-screen">
    <div class="header-bar">
        <div class="tabs">
            <span class="active">Games</span>
            <span>Media</span>
        </div>
        <div class="status-icons">
            <span>🔍</span>
            <span>⚙️</span>
            <span>👤</span>
            <span id="current-time">--:--</span>
        </div>
    </div>

    <div class="app-row" id="dynamic-app-row">
        <div class="app-icon store-btn" id="store-btn">Store</div>
    </div>

    <div class="hero-info">
        <div class="hero-tag">FlintOS Media Node</div>
        <h1 class="hero-title" id="hero-title">Syncing...</h1>
        <p class="hero-desc" id="hero-desc">Connecting...</p>
        <button class="action-btn" id="play-btn">Play Game</button>
    </div>

    <div class="activities">
        <div class="activity-card" style="background: linear-gradient(rgba(0,0,0,0.1), rgba(0,0,0,0.85)), url('https://images.unsplash.com/photo-1542751371-adc38448a05e?w=300') center/cover;">
            <div class="activity-header"><span>🎮</span> Activity</div>
            <div class="activity-title">Resume Active Session</div>
        </div>
        <div class="activity-card">
            <div class="activity-header"><span>🏆</span> Trophies</div>
            <div class="activity-title">Next Level Goal<br><span style="font-size:0.8rem; opacity:0.5;">88% Completed</span></div>
        </div>
    </div>
</div>
