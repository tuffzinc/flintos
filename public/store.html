<head>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<style>
    .store-screen {
        height: 100%;
        background: radial-gradient(circle at top right, #001f4d, #000000);
        padding: 30px 50px;
        box-sizing: border-box;
        display: flex;
        flex-direction: column;
        animation: slideUp 0.4s cubic-bezier(0.2, 0.8, 0.2, 1);
    }
    .store-header {
        display: flex;
        align-items: center;
        gap: 20px;
        margin-bottom: 30px;
    }
    .back-btn {
        background: rgba(255,255,255,0.1);
        border: none;
        color: white;
        width: 40px;
        height: 40px;
        border-radius: 50%;
        cursor: pointer;
        font-size: 1rem;
        display: flex;
        align-items: center;
        justify-content: center;
        backdrop-filter: blur(5px);
        transition: all 0.2s;
    }
    .back-btn:hover { background: rgba(255,255,255,0.3); transform: scale(1.1); }
    .store-title {
        font-size: 1.8rem;
        font-weight: 300;
        margin: 0;
        letter-spacing: 1px;
    }
    
    .store-nav {
        display: flex;
        gap: 30px;
        margin-bottom: 30px;
        border-bottom: 1px solid rgba(255,255,255,0.1);
        padding-bottom: 15px;
    }
    .store-nav span { opacity: 0.6; cursor: pointer; font-weight: 500; transition: opacity 0.2s; }
    .store-nav span:hover { opacity: 1; }
    .store-nav span.active { opacity: 1; border-bottom: 2px solid #fff; padding-bottom: 16px; margin-bottom: -16px; }

    .store-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
        gap: 20px;
        overflow-y: auto;
        padding-right: 10px;
    }
    .store-grid::-webkit-scrollbar { width: 0; }
    
    .store-item {
        height: 280px;
        border-radius: 12px;
        display: flex;
        flex-direction: column;
        justify-content: flex-end;
        padding: 15px;
        transition: all 0.25s cubic-bezier(0.2, 0.8, 0.2, 1);
        cursor: pointer;
        border: 1px solid transparent;
        position: relative;
        overflow: hidden;
        /* FIXED: Forces browser render layers to snap without fractional trailing edge bleeding */
        background-repeat: no-repeat !important;
    }
    .store-item > * { position: relative; z-index: 2; }
    .store-item:hover {
        transform: translateY(-5px) scale(1.02);
        border-color: #0070cc;
        box-shadow: 0 10px 24px rgba(0, 112, 204, 0.45);
    }
    .item-title { margin: 0; font-size: 1.1rem; font-weight: 500; text-shadow: 0 2px 4px rgba(0,0,0,0.8); }
    .item-price { color: #fff; font-weight: bold; margin-top: 8px; font-size: 0.85rem; background: #0070cc; padding: 5px 12px; border-radius: 6px; align-self: flex-start; display: flex; align-items: center; transition: background 0.2s; }
    
    @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
</style>

<div class="store-screen">
    <div class="store-header">
        <button class="back-btn" id="back-btn"><i class="fas fa-arrow-left"></i></button>
        <h2 class="store-title">FlintOS Store</h2>
    </div>
    <div class="store-nav">
        <span class="active">All Software</span>
        <span>Collections</span>
        <span>Deals</span>
        <span>Subscriptions</span>
    </div>
    
    <div class="store-grid" id="dynamic-store-grid"></div>
</div>
